<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hydra Phone — Display</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
      canvas { display: block; width: 100%; height: 100%; }
      #qr-overlay {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #1A1A2E; color: #fff;
        font-family: monospace; gap: 24px;
        z-index: 10;
      }
      #qr-overlay h1 { font-size: 1.5rem; letter-spacing: 0.1em; }
      #qr-overlay p { font-size: 0.85rem; color: #B0BEC5; }
      #qr-canvas { border: 4px solid #fff; border-radius: 8px; }
      #session-id { font-size: 0.75rem; color: #455A64; }
    </style>
    <!-- Required before any module: gives hydra-synth the `global` it expects -->
    <script>window.global = window;</script>
  </head>
  <body>
    <canvas id="hydra-canvas"></canvas>
    <div id="qr-overlay">
      <h1>HYDRA PHONE</h1>
      <canvas id="qr-canvas"></canvas>
      <p>Scan with your phone to start</p>
      <span id="session-id"></span>
    </div>
    <script type="module" src="/src/display/main.ts"></script>
  </body>
</html>
